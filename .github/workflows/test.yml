name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create test memory files
        run: |
          mkdir -p ~/.claude/projects/test-project/memory
          cat > ~/.claude/projects/test-project/memory/test-rule.md << 'EOF'
          ---
          name: test-rule
          description: Test feedback rule
          type: feedback
          ---
          # Test Rule
          Never do X because Y.
          EOF

          cat > ~/.claude/projects/test-project/memory/test-project.md << 'EOF'
          ---
          name: test-project-memory
          description: Test project memory
          metadata:
            type: project
            evidence: observed
            card_kind: decision
            status: current
          ---
          # Test Project
          ## Section A
          Content about section A.
          ## Section B
          Content about section B.
          EOF

      - name: Test full index
        run: |
          bash bin/index.sh --full
          CHUNKS=$(sqlite3 ~/.claude/memory-system/db/index.db "SELECT COUNT(*) FROM memory_chunks")
          echo "Indexed $CHUNKS chunks"
          [ "$CHUNKS" -ge 2 ] || exit 1
          sqlite3 ~/.claude/memory-system/db/index.db "SELECT card_kind, status, area, supersedes, superseded_by FROM memory_chunks LIMIT 1" >/dev/null

      - name: Test incremental index
        run: |
          bash bin/index.sh --incremental
          echo "Incremental OK"

      - name: Test search
        run: |
          RESULTS=$(bash bin/search.sh "test rule" --limit 3 2>&1)
          echo "$RESULTS"
          echo "$RESULTS" | grep -q "score=" || exit 1
          echo "$RESULTS" | grep -q "confidence=high" || exit 1

      - name: Test search with type filter
        run: |
          RESULTS=$(bash bin/search.sh "test" --type feedback --limit 3 2>&1)
          echo "$RESULTS" | grep -q "feedback" || exit 1

      - name: Test search JSON output
        run: |
          bash bin/search.sh "test" --json --limit 3 | python3 -c "import json,sys; data=json.load(sys.stdin); assert data; assert all('confidence' in r and 'retrieval_score' in r for r in data)" || exit 1

      - name: Test structured no-confident search output
        run: |
          bash bin/search.sh "zzzznotarealmemoryquery" --json-object --limit 3 | python3 -c "import json,sys; data=json.load(sys.stdin); assert data['no_confident_results'] is True; assert 'results' in data; assert data['best_confidence'] == 'low'" || exit 1

      - name: Test lifecycle inference ignores storage paths
        run: |
          python3 - << 'PY'
          import sys
          sys.path.insert(0, "bin")
          import index_impl

          archive_path = "/tmp/archive/project/finding-active-rule.md"
          assert index_impl.infer_status({"name": "active rule"}, archive_path) == "current"
          assert index_impl.infer_card_kind({"type": "project", "name": "debug tips"}, "/tmp/memory/debug-tips.md") != "bug"
          assert index_impl.infer_status({"name": "old rule", "status": "archived"}, "/tmp/active/old-rule.md") == "archived"
          PY

      - name: Test recall smoke contract assertions
        run: |
          python3 - << 'PY'
          import sys
          sys.path.insert(0, "bin")
          import recall_smoke

          positive = {"expect_any": ["needle"], "min_confidence": "medium"}
          bad_positive = {
              "no_confident_results": True,
              "results": [{"path": "needle.md", "confidence": "high"}],
          }
          ok, detail = recall_smoke.evaluate(positive, bad_positive)
          assert not ok and "no_confident_results=true" in detail

          negative = {"expect_no_confident": True}
          bad_negative = {"no_confident_results": False, "results": []}
          ok, detail = recall_smoke.evaluate(negative, bad_negative)
          assert not ok and "expected no_confident_results=true" in detail
          PY

      - name: Test stable age drift identity migration
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import drift_check

          fd, path = tempfile.mkstemp(suffix=".db")
          os.close(fd)
          try:
              conn = drift_check.init_drift_db(path)
              conn.execute(
                  "INSERT INTO drift_findings (path, drift_type, detail, memory_type, detected_at, first_seen) VALUES (?, 'age_stale', ?, 'project', '2026-05-23T00:00:00Z', 4)",
                  ("/tmp/project.md", "age=88d threshold=30d"),
              )
              conn.commit()
              conn.close()

              conn = drift_check.init_drift_db(path)
              rows = conn.execute("SELECT detail, first_seen FROM drift_findings WHERE drift_type = 'age_stale'").fetchall()
              assert rows == [("threshold=30d", 4)], rows
              conn.close()
          finally:
              os.remove(path)
          PY

      - name: Test confidence escalation counts files, not chunks
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import drift_check

          conn = sqlite3.connect(":memory:")
          conn.execute(
              "CREATE TABLE memory_chunks (path TEXT, type TEXT, source TEXT, section_heading TEXT, content TEXT)"
          )
          for idx in range(4):
              conn.execute(
                  "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', ?, 'body')",
                  ("/tmp/multi-section-agent.md", f"Section {idx}"),
              )
          assert drift_check.check_confidence_escalation(conn) == []

          conn.execute(
              "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', 'History', ?)",
              (
                  "/tmp/repeated-agent.md",
                  "- 2026-01-01: First signal\n- 2026-01-02: Second signal\n- 2026-01-03: Third signal\n",
              ),
          )
          findings = drift_check.check_confidence_escalation(conn)
          assert findings == [
              ("/tmp/repeated-agent.md", "project", "confidence_escalation", "threshold=3")
          ], findings
          conn.execute(
              "UPDATE memory_chunks SET content = content || '- 2026-01-04: Fourth signal\n' WHERE path = ? AND section_heading = 'History'",
              ("/tmp/repeated-agent.md",),
          )
          assert drift_check.check_confidence_escalation(conn) == findings
          conn.execute(
              "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', 'Details', ?)",
              (
                  "/tmp/misplaced-history-agent.md",
                  "- 2026-01-01: First misplaced signal\n- 2026-01-02: Second misplaced signal\n- 2026-01-03: Third misplaced signal\n",
              ),
          )
          assert (
              "/tmp/misplaced-history-agent.md",
              "project",
              "confidence_escalation",
              "threshold=3",
          ) in drift_check.check_confidence_escalation(conn)

          fd, path = tempfile.mkstemp(suffix=".db")
          os.close(fd)
          try:
              drift_conn = drift_check.init_drift_db(path)
              drift_conn.execute(
                  "INSERT INTO drift_findings (path, drift_type, detail, memory_type, detected_at, first_seen) VALUES (?, 'confidence_escalation', 'agent=4', 'project', '2026-05-24T00:00:00Z', 5)",
                  ("/tmp/repeated-agent.md",),
              )
              drift_conn.commit()
              drift_conn.close()
              drift_conn = drift_check.init_drift_db(path)
              rows = drift_conn.execute(
                  "SELECT detail, first_seen FROM drift_findings WHERE drift_type = 'confidence_escalation'"
              ).fetchall()
              assert rows == [("threshold=3", 5)], rows
              drift_conn.close()
          finally:
              os.remove(path)
          PY

      - name: Test compound appends history inside section
        run: |
          python3 - << 'PY'
          import os
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import compound

          fd, path = tempfile.mkstemp(suffix=".md")
          os.close(fd)
          try:
              with open(path, "w", encoding="utf-8") as f:
                  f.write(
                      "# Memory\n\n"
                      "## History\n\n"
                      "- 2026-01-01: Existing signal\n\n"
                      "## Details\n\n"
                      "Keep this section after history.\n"
                  )
              assert compound.update_existing(path, "New signal")
              text = open(path, encoding="utf-8").read()
              assert text.count("## History") == 1
              assert text.index("New signal") < text.index("## Details")

              with open(path, "w", encoding="utf-8") as f:
                  f.write(
                      "# Template Note\n\n"
                      "```md\n"
                      "## History\n\n"
                      "- example only\n"
                      "```\n\n"
                      "## Details\n\n"
                      "Keep real content outside the example.\n"
                  )
              assert compound.update_existing(path, "Fenced-safe signal")
              text = open(path, encoding="utf-8").read()
              fence_end = text.index("```\n\n## Details")
              inserted = text.index("Fenced-safe signal")
              assert inserted > fence_end
          finally:
              os.remove(path)
          PY

      - name: Test custom memory system wrapper routing
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          export EIDETIC_MEMORY_SYSTEM="$tmp/custom-memory-system"
          mkdir -p "$HOME/.claude/projects/custom-project/memory" "$EIDETIC_MEMORY_SYSTEM/bin" "$EIDETIC_MEMORY_SYSTEM/db"
          cp bin/index.sh bin/index_impl.py bin/serendipity.py bin/compound.py "$EIDETIC_MEMORY_SYSTEM/bin/"
          cp mcp_server.py "$EIDETIC_MEMORY_SYSTEM/mcp_server.py"
          printf '{"version":"test"}\n' > "$EIDETIC_MEMORY_SYSTEM/.installed.json"
          chmod +x "$EIDETIC_MEMORY_SYSTEM/bin/index.sh"
          cat > "$HOME/.claude/projects/custom-project/memory/custom-rule.md" << 'EOF'
          ---
          name: custom-rule
          description: Custom memory system routing smoke
          type: feedback
          ---
          # Custom Rule
          Custom memory system routing should use the override DB.
          EOF
          bash bin/index.sh --full
          test -f "$EIDETIC_MEMORY_SYSTEM/db/index.db"
          test ! -f "$HOME/.claude/memory-system/db/index.db"
          bash bin/search.sh "custom memory system routing" --limit 1 | grep -q "custom-rule"
          env -u EIDETIC_MEMORY_SYSTEM "$EIDETIC_MEMORY_SYSTEM/bin/index.sh" --full >/dev/null
          python3 - << 'PY'
          import importlib.util
          import os
          import sys
          sys.path.insert(0, ".")
          import mcp_server

          expected = os.path.join(os.environ["EIDETIC_MEMORY_SYSTEM"], "db", "index.db")
          assert mcp_server.INDEX_DB == expected
          result = mcp_server.handle_reindex({"full": False})
          assert not result["_mcp_result"].get("isError"), result
          result = mcp_server.handle_serendipity({"query": "custom memory system routing"})
          assert not result["_mcp_result"].get("isError"), result
          os.environ.pop("EIDETIC_MEMORY_SYSTEM", None)
          installed_root = expected.rsplit("/db/index.db", 1)[0]
          spec = importlib.util.spec_from_file_location("installed_mcp", os.path.join(installed_root, "mcp_server.py"))
          installed_mcp = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(installed_mcp)
          assert installed_mcp.INDEX_DB == expected
          PY

      - name: Test custom memory system install persists routing
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          export EIDETIC_MEMORY_SYSTEM="$tmp/custom memory-system"
          mkdir -p "$HOME/.claude/hooks" "$HOME/.claude/projects/test-project/memory"
          cat > "$HOME/.claude/settings.json" << 'EOF'
          {
            "hooks": {
              "SessionStart": [
                {"hooks": [{"type": "command", "command": "~/.claude/hooks/smart-memory-inject.sh", "timeout": 5000}]}
              ],
              "Stop": [
                {"hooks": [{"type": "command", "command": "~/.claude/hooks/session-signals.sh", "timeout": 30000, "async": true}]}
              ]
            }
          }
          EOF
          cat > "$HOME/.claude/projects/test-project/memory/test-rule.md" << 'EOF'
          ---
          name: test-rule
          description: Test feedback rule
          type: feedback
          ---
          # Test Rule
          Custom install smoke.
          EOF
          bash install.sh >/dev/null
          python3 - << 'PY'
          import json
          import os
          import shlex
          from pathlib import Path

          home = Path(os.environ["HOME"])
          memory_system = os.environ["EIDETIC_MEMORY_SYSTEM"]
          settings = json.loads((home / ".claude/settings.json").read_text())
          commands = []
          for entries in settings["hooks"].values():
              for entry in entries:
                  for hook in entry.get("hooks", []):
                      commands.append(hook.get("command", ""))
          assert any(
              cmd.startswith("EIDETIC_MEMORY_SYSTEM=")
              and "smart-memory-inject" in cmd
              and memory_system in cmd
              for cmd in commands
          ), commands
          assert any(
              cmd.startswith("EIDETIC_MEMORY_SYSTEM=")
              and "session-signals" in cmd
              and memory_system in cmd
              for cmd in commands
          ), commands
          skill = (home / ".claude/skills/memory-recall/SKILL.md").read_text()
          assert memory_system in skill
          assert "~/.claude/memory-system" not in skill
          expected_search = str(Path(memory_system) / "bin/search.sh")
          search_commands = [
              line.strip()
              for line in skill.splitlines()
              if "bin/search.sh" in line and not line.strip().startswith("#")
          ]
          assert search_commands, skill
          for command in search_commands:
              assert shlex.split(command)[0] == expected_search, command
          assert (Path(memory_system) / ".installed.json").exists()
          PY

      - name: Test export polish preserves placeholders and model overrides
        run: |
          python3 - << 'PY'
          import importlib
          import os
          import sys
          sys.path.insert(0, "bin")
          import export_vault

          assert export_vault.TOPIC_SYNTHESIS_MODEL == "claude-opus-4-6"
          os.environ["EIDETIC_POLISH_MODEL_SONNET"] = "claude-sonnet-test"
          os.environ["EIDETIC_POLISH_MODEL_HAIKU"] = "claude-haiku-test"
          os.environ["EIDETIC_TOPIC_CLUSTER_MODEL"] = "claude-cluster-test"
          os.environ["EIDETIC_TOPIC_SYNTHESIS_MODEL"] = "claude-synthesis-test"
          importlib.reload(export_vault)

          body = "Keep literals: {max_words} and {body}."
          prompt = export_vault._build_polish_prompt(body, 123)
          assert "Hard limit: 123 words." in prompt
          assert body in prompt
          assert export_vault.choose_polish_model("simple body") == "claude-haiku-test"
          assert export_vault.choose_polish_model("```python\nprint(1)\n```") == "claude-sonnet-test"
          assert export_vault.TOPIC_CLUSTER_MODEL == "claude-cluster-test"
          assert export_vault.TOPIC_SYNTHESIS_MODEL == "claude-synthesis-test"
          PY

      - name: Test output handoff discovery
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          mkdir -p "$tmp/output/handoff-test"
          printf 'fresh handoff sentinel\n' > "$tmp/output/handoff-test/state.md"
          python3 - << 'PY' "$tmp"
          import sys
          sys.path.insert(0, "bin")
          import assemble_context

          text, used = assemble_context.fetch_fresh_handoff(sys.argv[1], "test")
          assert "fresh handoff sentinel" in text
          assert used == len(text)
          PY

      - name: Test cleanup protects large frontmatter and skill links
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          mkdir -p "$HOME/.claude/projects/test-project/memory" "$HOME/.claude/skills/test-skill"
          python3 - << 'PY'
          import os
          from pathlib import Path

          home = Path(os.environ["HOME"])
          memory = home / ".claude/projects/test-project/memory"
          skill = home / ".claude/skills/test-skill"
          long_description = "x" * 20000
          (memory / "large-frontmatter.md").write_text(
              "---\n"
              "name: large-frontmatter\n"
              f"description: {long_description}\n"
              "metadata:\n"
              "  type: feedback\n"
              "---\n"
              "# Protected\n",
              encoding="utf-8",
          )
          (memory / "skill-linked.md").write_text(
              "---\nname: skill-linked\ntype: project\n---\n# Skill Linked\n",
              encoding="utf-8",
          )
          (skill / "SKILL.md").write_text("Use [[skill-linked]] for the workflow.\n", encoding="utf-8")
          PY
          python3 - << 'PY'
          import os
          import sys
          sys.path.insert(0, "bin")
          import cleanup

          files = cleanup.collect_files()
          large = os.path.join(os.environ["HOME"], ".claude/projects/test-project/memory/large-frontmatter.md")
          target = os.path.join(os.environ["HOME"], ".claude/projects/test-project/memory/skill-linked.md")
          assert cleanup.get_type(large) == "feedback"
          inbound = cleanup.count_inbound(files)
          assert inbound[target] == 1, inbound
          PY

      - name: Test wikilink lint ignores markdown examples
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          cat > "$tmp/example.md" << 'EOF'
          # Example

          ### [[filename]]

          ```
          [[Atomic notes]]
          [[Review]]
          ```

          Real link: [[real-target]]

          Inline code: `inputs:[[chunk1, chunk2, ...]]`
          EOF
          python3 - << 'PY' "$tmp/example.md"
          import sys
          sys.path.insert(0, "bin")
          import drift_check
          import lint_impl

          path = sys.argv[1]
          assert lint_impl.extract_wikilinks(path) == ["real-target"]
          text = open(path).read()
          assert drift_check.extract_wikilinks_from_content(text) == ["real-target"]
          PY

      - name: Test old DB lifecycle backfill
        run: |
          tmp_home=$(mktemp -d)
          trap 'rm -rf "$tmp_home"' EXIT
          export HOME="$tmp_home"
          mkdir -p "$HOME/.claude/projects/test-project/memory" "$HOME/.claude/memory-system/db"
          cat > "$HOME/.claude/projects/test-project/memory/old-bug.md" << 'EOF'
          ---
          name: old-bug-memory
          description: Regression fixed in old flow
          type: project
          ---
          # Old Bug
          Body.
          EOF
          python3 - << 'PY'
          import os
          import sqlite3
          from pathlib import Path

          db = Path.home() / ".claude/memory-system/db/index.db"
          mem = Path.home() / ".claude/projects/test-project/memory/old-bug.md"
          mtime = int(mem.stat().st_mtime)
          conn = sqlite3.connect(db)
          conn.executescript("""
          CREATE TABLE memory_chunks (
              id INTEGER PRIMARY KEY,
              path TEXT NOT NULL,
              project TEXT,
              name TEXT,
              type TEXT,
              evidence TEXT DEFAULT 'observed',
              source TEXT DEFAULT 'user-explicit',
              confidence REAL DEFAULT 0.7,
              last_verified TEXT,
              section_heading TEXT,
              content TEXT NOT NULL,
              description TEXT,
              mtime INTEGER,
              UNIQUE(path, section_heading)
          );
          CREATE VIRTUAL TABLE memory_fts USING fts5(
              name, description, section_heading, content,
              content=memory_chunks,
              content_rowid=id,
              tokenize='porter unicode61'
          );
          CREATE TRIGGER memory_chunks_ai AFTER INSERT ON memory_chunks BEGIN
              INSERT INTO memory_fts(rowid, name, description, section_heading, content)
              VALUES (new.id, new.name, new.description, new.section_heading, new.content);
          END;
          CREATE TRIGGER memory_chunks_ad AFTER DELETE ON memory_chunks BEGIN
              INSERT INTO memory_fts(memory_fts, rowid, name, description, section_heading, content)
              VALUES ('delete', old.id, old.name, old.description, old.section_heading, old.content);
          END;
          CREATE TRIGGER memory_chunks_au AFTER UPDATE ON memory_chunks BEGIN
              INSERT INTO memory_fts(memory_fts, rowid, name, description, section_heading, content)
              VALUES ('delete', old.id, old.name, old.description, old.section_heading, old.content);
              INSERT INTO memory_fts(rowid, name, description, section_heading, content)
              VALUES (new.id, new.name, new.description, new.section_heading, new.content);
          END;
          CREATE TABLE index_meta (path TEXT PRIMARY KEY, mtime INTEGER);
          """)
          conn.execute(
              "INSERT INTO memory_chunks (path, project, name, type, evidence, source, section_heading, content, description, mtime) VALUES (?, 'test-project', 'old-bug-memory', 'project', 'observed', 'user-explicit', 'old-bug', 'Body.', 'Regression fixed in old flow', ?)",
              (str(mem), mtime),
          )
          conn.execute("INSERT INTO index_meta (path, mtime) VALUES (?, ?)", (str(mem), mtime))
          stale = str(Path.home() / ".claude/projects/test-project/memory/deleted.md")
          conn.execute(
              "INSERT INTO memory_chunks (path, project, name, type, evidence, source, section_heading, content, description, mtime) VALUES (?, 'test-project', 'deleted-memory', 'project', 'observed', 'user-explicit', 'deleted', 'Deleted.', 'Deleted file', ?)",
              (stale, mtime),
          )
          conn.execute("INSERT INTO index_meta (path, mtime) VALUES (?, ?)", (stale, mtime))
          conn.commit()
          conn.close()
          PY
          python3 bin/index_impl.py --incremental "$HOME/.claude/memory-system/db/index.db"
          sqlite3 "$HOME/.claude/memory-system/db/index.db" "SELECT card_kind, status FROM memory_chunks WHERE name = 'old-bug-memory' LIMIT 1" \
            | grep -q '^bug|resolved$'
          [ "$(sqlite3 "$HOME/.claude/memory-system/db/index.db" "SELECT COUNT(*) FROM memory_chunks WHERE name = 'deleted-memory'")" = "0" ]

      - name: Test incremental clears emptied memory files
        run: |
          tmp_home=$(mktemp -d)
          trap 'rm -rf "$tmp_home"' EXIT
          export HOME="$tmp_home"
          mkdir -p "$HOME/.claude/projects/test-project/memory" "$HOME/.claude/memory-system/db"
          cat > "$HOME/.claude/projects/test-project/memory/empty-me.md" << 'EOF'
          ---
          name: empty-me
          type: project
          ---
          # Empty Me
          Old body
          EOF
          python3 bin/index_impl.py --full "$HOME/.claude/memory-system/db/index.db" >/dev/null
          cat > "$HOME/.claude/projects/test-project/memory/empty-me.md" << 'EOF'
          ---
          name: empty-me
          type: project
          ---
          EOF
          python3 bin/index_impl.py --incremental "$HOME/.claude/memory-system/db/index.db" >/dev/null
          [ "$(sqlite3 "$HOME/.claude/memory-system/db/index.db" "SELECT COUNT(*) FROM memory_chunks WHERE name = 'empty-me'")" = "0" ]

      - name: Test vector identity guards stale chunk ids
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import embed

          tmp = tempfile.mkdtemp()
          index_db = os.path.join(tmp, "index.db")
          vector_db = os.path.join(tmp, "vectors.db")
          conn = sqlite3.connect(index_db)
          conn.execute("""
              CREATE TABLE memory_chunks (
                  id INTEGER PRIMARY KEY,
                  path TEXT,
                  name TEXT,
                  description TEXT,
                  content TEXT,
                  section_heading TEXT,
                  mtime INTEGER
              )
          """)
          conn.execute(
              "INSERT INTO memory_chunks VALUES (1, '/tmp/new.md', 'new', 'desc', 'fresh content', 'Heading', 100)"
          )
          conn.commit()
          conn.close()

          vec = embed.init_vector_db(vector_db)
          vec.execute(
              "INSERT INTO vectors (chunk_id, path, name, section_heading, content_hash, embedding, mtime) VALUES (1, '/tmp/old.md', 'old', 'Old', 'stale', ?, 100)",
              (b"stale-vector",),
          )
          vec.commit()
          vec.close()

          embed.embed_texts = lambda texts: [b"fresh-vector" for _ in texts]
          embed.run_incremental(index_db, vector_db)

          vec = sqlite3.connect(vector_db)
          row = vec.execute("SELECT path, section_heading, content_hash, embedding FROM vectors WHERE chunk_id = 1").fetchone()
          assert row[0] == "/tmp/new.md", row
          assert row[1] == "Heading", row
