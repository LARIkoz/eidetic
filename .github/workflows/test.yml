name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create test memory files
        run: |
          mkdir -p ~/.claude/projects/test-project/memory
          cat > ~/.claude/projects/test-project/memory/test-rule.md << 'EOF'
          ---
          name: test-rule
          description: Test feedback rule
          type: feedback
          ---
          # Test Rule
          Never do X because Y.
          EOF

          cat > ~/.claude/projects/test-project/memory/test-project.md << 'EOF'
          ---
          name: test-project-memory
          description: Test project memory
          metadata:
            type: project
            evidence: observed
            card_kind: decision
            status: current
          ---
          # Test Project
          ## Section A
          Content about section A.
          ## Section B
          Content about section B.
          EOF

      - name: Test full index
        run: |
          bash bin/index.sh --full
          CHUNKS=$(sqlite3 ~/.claude/memory-system/db/index.db "SELECT COUNT(*) FROM memory_chunks")
          echo "Indexed $CHUNKS chunks"
          [ "$CHUNKS" -ge 2 ] || exit 1
          sqlite3 ~/.claude/memory-system/db/index.db "SELECT card_kind, status, area, supersedes, superseded_by FROM memory_chunks LIMIT 1" >/dev/null

      - name: Test incremental index
        run: |
          bash bin/index.sh --incremental
          echo "Incremental OK"

      - name: Test search
        run: |
          RESULTS=$(bash bin/search.sh "test rule" --limit 3 2>&1)
          echo "$RESULTS"
          echo "$RESULTS" | grep -q "score=" || exit 1
          echo "$RESULTS" | grep -q "confidence=high" || exit 1

      - name: Test search with type filter
        run: |
          RESULTS=$(bash bin/search.sh "test" --type feedback --limit 3 2>&1)
          echo "$RESULTS" | grep -q "feedback" || exit 1

      - name: Test search JSON output
        run: |
          bash bin/search.sh "test" --json --limit 3 | python3 -c "import json,sys; data=json.load(sys.stdin); assert data; assert all('confidence' in r and 'retrieval_score' in r for r in data)" || exit 1

      - name: Test structured no-confident search output
        run: |
          bash bin/search.sh "zzzznotarealmemoryquery" --json-object --limit 3 | python3 -c "import json,sys; data=json.load(sys.stdin); assert data['no_confident_results'] is True; assert 'results' in data; assert data['best_confidence'] == 'low'" || exit 1

      - name: Test lifecycle inference ignores storage paths
        run: |
          python3 - << 'PY'
          import sys
          sys.path.insert(0, "bin")
          import index_impl

          archive_path = "/tmp/archive/project/finding-active-rule.md"
          assert index_impl.infer_status({"name": "active rule"}, archive_path) == "current"
          assert index_impl.infer_card_kind({"type": "project", "name": "debug tips"}, "/tmp/memory/debug-tips.md") != "bug"
          assert index_impl.infer_status({"name": "old rule", "status": "archived"}, "/tmp/active/old-rule.md") == "archived"
          assert index_impl.infer_status({"type": "feedback", "name": "2 FIXED 2 OPEN", "description": "deprecated route note"}, "/tmp/rule.md") == "current"
          assert index_impl.infer_status({"type": "user", "name": "closed loop preference"}, "/tmp/profile.md") == "current"
          assert index_impl.infer_status({"type": "feedback", "name": "old rule", "status": "archived"}, "/tmp/rule.md") == "archived"
          assert index_impl.infer_status({"name": "closed issue", "status": "fixed"}, "/tmp/bug.md") == "fixed"
          PY

      - name: Test feedback status migration corrects inferred inactive rows only
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import index_impl

          tmp = tempfile.mkdtemp()
          inferred = os.path.join(tmp, "inferred.md")
          explicit = os.path.join(tmp, "explicit.md")
          open(inferred, "w").write("---\ntype: feedback\nname: 2 FIXED 2 OPEN\ndescription: Deprecated route note but still active.\n---\nbody\n")
          open(explicit, "w").write("---\ntype: feedback\nname: archived rule\nstatus: archived\n---\nbody\n")
          conn = sqlite3.connect(":memory:")
          conn.execute("CREATE TABLE memory_chunks (path TEXT, type TEXT, status TEXT, superseded_by TEXT)")
          conn.execute("INSERT INTO memory_chunks VALUES (?, 'feedback', 'resolved', '')", (inferred,))
          conn.execute("INSERT INTO memory_chunks VALUES (?, 'feedback', 'archived', '')", (explicit,))
          index_impl.migrate_feedback_user_inferred_statuses(conn)
          rows = dict(conn.execute("SELECT path, status FROM memory_chunks").fetchall())
          assert rows[inferred] == "current", rows
          assert rows[explicit] == "archived", rows
          PY

      - name: Test recall smoke contract assertions
        run: |
          python3 - << 'PY'
          import sys
          sys.path.insert(0, "bin")
          import recall_smoke

          positive = {"expect_any": ["needle"], "min_confidence": "medium"}
          bad_positive = {
              "no_confident_results": True,
              "results": [{"path": "needle.md", "confidence": "high"}],
          }
          ok, detail = recall_smoke.evaluate(positive, bad_positive)
          assert not ok and "no_confident_results=true" in detail

          negative = {"expect_no_confident": True}
          bad_negative = {"no_confident_results": False, "results": []}
          ok, detail = recall_smoke.evaluate(negative, bad_negative)
          assert not ok and "expected no_confident_results=true" in detail
          PY

      - name: Test stable age drift identity migration
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import drift_check

          fd, path = tempfile.mkstemp(suffix=".db")
          os.close(fd)
          try:
              conn = drift_check.init_drift_db(path)
              conn.execute(
                  "INSERT INTO drift_findings (path, drift_type, detail, memory_type, detected_at, first_seen) VALUES (?, 'age_stale', ?, 'project', '2026-05-23T00:00:00Z', 4)",
                  ("/tmp/project.md", "age=88d threshold=30d"),
              )
              conn.commit()
              conn.close()

              conn = drift_check.init_drift_db(path)
              rows = conn.execute("SELECT detail, first_seen FROM drift_findings WHERE drift_type = 'age_stale'").fetchall()
              assert rows == [("threshold=30d", 4)], rows
              conn.close()
          finally:
              os.remove(path)
          PY

      - name: Test age drift honors lifecycle and card kind
        run: |
          python3 - << 'PY'
          from datetime import datetime, timedelta
          import sqlite3
          import sys
          sys.path.insert(0, "bin")
          import drift_check

          conn = sqlite3.connect(":memory:")
          conn.execute("""
              CREATE TABLE memory_chunks (
                  id INTEGER PRIMARY KEY,
                  path TEXT,
                  type TEXT,
                  evidence TEXT,
                  last_verified TEXT,
                  mtime INTEGER,
                  card_kind TEXT,
                  status TEXT
              )
          """)
          old_for_60 = (datetime.now() - timedelta(days=66)).date().isoformat()
          recent_for_60 = (datetime.now() - timedelta(days=35)).date().isoformat()
          very_old = (datetime.now() - timedelta(days=180)).date().isoformat()
          rows = [
              ("/tmp/current-project.md", "project", "observed", old_for_60, 0, "finding", "current"),
              ("/tmp/current-todo.md", "project", "observed", old_for_60, 0, "todo", "current"),
              ("/tmp/recent-todo.md", "project", "observed", recent_for_60, 0, "todo", "current"),
              ("/tmp/archived-status.md", "project", "observed", very_old, 0, "status", "archived"),
              ("/tmp/fixed-bug.md", "project", "observed", very_old, 0, "bug", "fixed"),
              ("/tmp/reference.md", "project", "observed", old_for_60, 0, "reference", "current"),
              ("/tmp/source.py", "code", "observed", very_old, 0, "code", "current"),
          ]
          conn.executemany(
              "INSERT INTO memory_chunks (path, type, evidence, last_verified, mtime, card_kind, status) VALUES (?, ?, ?, ?, ?, ?, ?)",
              rows,
          )
          findings = drift_check.check_age_drift(conn)
          assert findings == [
              ("/tmp/current-todo.md", "project", "age_stale", "threshold=60d")
          ], findings
          PY

      - name: Test confidence escalation counts files, not chunks
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import drift_check
          import index_impl

          conn = sqlite3.connect(":memory:")
          conn.execute(
              "CREATE TABLE memory_chunks (path TEXT, type TEXT, source TEXT, section_heading TEXT, content TEXT)"
          )
          for idx in range(4):
              conn.execute(
                  "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', ?, 'body')",
                  ("/tmp/multi-section-agent.md", f"Section {idx}"),
              )
          assert drift_check.check_confidence_escalation(conn) == []

          conn.execute(
              "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', 'History', ?)",
              (
                  "/tmp/repeated-agent.md",
                  "- 2026-01-01: First signal\n- 2026-01-02: Second signal\n- 2026-01-03: Third signal\n",
              ),
          )
          findings = drift_check.check_confidence_escalation(conn)
          assert findings == [
              ("/tmp/repeated-agent.md", "project", "confidence_escalation", "threshold=3")
          ], findings
          conn.execute(
              "UPDATE memory_chunks SET content = content || '- 2026-01-04: Fourth signal\n' WHERE path = ? AND section_heading = 'History'",
              ("/tmp/repeated-agent.md",),
          )
          assert drift_check.check_confidence_escalation(conn) == findings
          conn.execute(
              "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', 'Details', ?)",
              (
                  "/tmp/misplaced-history-agent.md",
                  "- 2026-01-01: First misplaced signal\n- 2026-01-02: Second misplaced signal\n- 2026-01-03: Third misplaced signal\n",
              ),
          )
          assert (
              "/tmp/misplaced-history-agent.md",
              "project",
              "confidence_escalation",
              "threshold=3",
          ) in drift_check.check_confidence_escalation(conn)
          conn.execute(
              "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', 'Template', ?)",
              (
                  "/tmp/fenced-history-example.md",
                  "```md\n- 2026-01-01: Example only\n- 2026-01-02: Example only\n- 2026-01-03: Example only\n```\n",
              ),
          )
          assert (
              "/tmp/fenced-history-example.md",
              "project",
              "confidence_escalation",
              "threshold=3",
          ) not in drift_check.check_confidence_escalation(conn)

          fenced_heading_body = (
              "# Template\n\n"
              "```md\n"
              "## History\n"
              "- 2026-01-01: Example only\n"
              "- 2026-01-02: Example only\n"
              "- 2026-01-03: Example only\n"
              "```\n"
          )
          for heading, content in index_impl.split_sections(
              fenced_heading_body, "/tmp/fenced-heading-example.md"
          ):
              conn.execute(
                  "INSERT INTO memory_chunks (path, type, source, section_heading, content) VALUES (?, 'project', 'agent-extracted', ?, ?)",
                  ("/tmp/fenced-heading-example.md", heading, content),
              )
          assert (
              "/tmp/fenced-heading-example.md",
              "project",
              "confidence_escalation",
              "threshold=3",
          ) not in drift_check.check_confidence_escalation(conn)

          fd, path = tempfile.mkstemp(suffix=".db")
          os.close(fd)
          try:
              drift_conn = drift_check.init_drift_db(path)
              drift_conn.execute(
                  "INSERT INTO drift_findings (path, drift_type, detail, memory_type, detected_at, first_seen) VALUES (?, 'confidence_escalation', 'agent=4', 'project', '2026-05-24T00:00:00Z', 5)",
                  ("/tmp/repeated-agent.md",),
              )
              drift_conn.commit()
              drift_conn.close()
              drift_conn = drift_check.init_drift_db(path)
              rows = drift_conn.execute(
                  "SELECT detail, first_seen FROM drift_findings WHERE drift_type = 'confidence_escalation'"
              ).fetchall()
              assert rows == [("threshold=3", 5)], rows
              drift_conn.close()
          finally:
              os.remove(path)
          PY

      - name: Test compound appends history inside section
        run: |
          python3 - << 'PY'
          import os
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import compound

          fd, path = tempfile.mkstemp(suffix=".md")
          os.close(fd)
          try:
              with open(path, "w", encoding="utf-8") as f:
                  f.write(
                      "# Memory\n\n"
                      "## History\n\n"
                      "- 2026-01-01: Existing signal\n\n"
                      "## Details\n\n"
                      "Keep this section after history.\n"
                  )
              assert compound.update_existing(path, "New signal")
              text = open(path, encoding="utf-8").read()
              assert text.count("## History") == 1
              assert text.index("New signal") < text.index("## Details")

              with open(path, "w", encoding="utf-8") as f:
                  f.write(
                      "# Template Note\n\n"
                      "```md\n"
                      "## History\n\n"
                      "- example only\n"
                      "```\n\n"
                      "## Details\n\n"
                      "Keep real content outside the example.\n"
                  )
              assert compound.update_existing(path, "Fenced-safe signal")
              text = open(path, encoding="utf-8").read()
              fence_end = text.index("```\n\n## Details")
              inserted = text.index("Fenced-safe signal")
              assert inserted > fence_end
          finally:
              os.remove(path)
          PY

      - name: Test custom memory system wrapper routing
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          export EIDETIC_MEMORY_SYSTEM="$tmp/custom-memory-system"
          mkdir -p "$HOME/.claude/projects/custom-project/memory" "$EIDETIC_MEMORY_SYSTEM/bin" "$EIDETIC_MEMORY_SYSTEM/db"
          cp bin/index.sh bin/index_impl.py bin/serendipity.py bin/compound.py "$EIDETIC_MEMORY_SYSTEM/bin/"
          cp mcp_server.py "$EIDETIC_MEMORY_SYSTEM/mcp_server.py"
          printf '{"version":"test"}\n' > "$EIDETIC_MEMORY_SYSTEM/.installed.json"
          chmod +x "$EIDETIC_MEMORY_SYSTEM/bin/index.sh"
          cat > "$HOME/.claude/projects/custom-project/memory/custom-rule.md" << 'EOF'
          ---
          name: custom-rule
          description: Custom memory system routing smoke
          type: feedback
          ---
          # Custom Rule
          Custom memory system routing should use the override DB.
          EOF
          bash bin/index.sh --full
          test -f "$EIDETIC_MEMORY_SYSTEM/db/index.db"
          test ! -f "$HOME/.claude/memory-system/db/index.db"
          bash bin/search.sh "custom memory system routing" --limit 1 | grep -q "custom-rule"
          env -u EIDETIC_MEMORY_SYSTEM "$EIDETIC_MEMORY_SYSTEM/bin/index.sh" --full >/dev/null
          python3 - << 'PY'
          import importlib.util
          import os
          import sys
          sys.path.insert(0, ".")
          import mcp_server

          expected = os.path.join(os.environ["EIDETIC_MEMORY_SYSTEM"], "db", "index.db")
          assert mcp_server.INDEX_DB == expected
          result = mcp_server.handle_reindex({"full": False})
          assert not result["_mcp_result"].get("isError"), result
          captured_reindex = {}
          old_subprocess_run = mcp_server.subprocess.run
          try:
              class FakeCompleted:
                  returncode = 0
                  stdout = "full ok"
                  stderr = ""

              def fake_run(cmd, capture_output, text, timeout):
                  captured_reindex.update(
                      cmd=cmd,
                      capture_output=capture_output,
                      text=text,
                      timeout=timeout,
                  )
                  return FakeCompleted()

              mcp_server.subprocess.run = fake_run
              result = mcp_server.handle_reindex({"full": True})
          finally:
              mcp_server.subprocess.run = old_subprocess_run
          assert not result["_mcp_result"].get("isError"), result
          assert captured_reindex["cmd"][-1] == "--full", captured_reindex
          assert captured_reindex["timeout"] == 300, captured_reindex
          result = mcp_server.handle_serendipity({"query": "custom memory system routing"})
          assert not result["_mcp_result"].get("isError"), result
          captured = {}
          old_run_script = mcp_server.run_script
          try:
              mcp_server.run_script = lambda script, args=None: captured.update(script=script, args=args) or {}
              mcp_server.handle_lint({})
          finally:
              mcp_server.run_script = old_run_script
          assert captured == {"script": "lint_impl.py", "args": [expected]}, captured
          os.environ.pop("EIDETIC_MEMORY_SYSTEM", None)
          installed_root = expected.rsplit("/db/index.db", 1)[0]
          spec = importlib.util.spec_from_file_location("installed_mcp", os.path.join(installed_root, "mcp_server.py"))
          installed_mcp = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(installed_mcp)
          assert installed_mcp.INDEX_DB == expected
          PY

      - name: Test custom memory system fallback signals are indexed
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          export EIDETIC_MEMORY_SYSTEM="$tmp/custom-memory-system"
          mkdir -p "$EIDETIC_MEMORY_SYSTEM/signals" "$EIDETIC_MEMORY_SYSTEM/db" "$HOME/.claude/projects"
          cat > "$EIDETIC_MEMORY_SYSTEM/signals/fallback.md" << 'EOF'
          ---
          name: fallback-signal
          metadata:
            type: project
            source: agent-extracted
          ---
          # Fallback Signal
          Custom fallback signals must be indexed.
          EOF
          python3 bin/index_impl.py --full "$EIDETIC_MEMORY_SYSTEM/db/index.db" >/dev/null
          sqlite3 "$EIDETIC_MEMORY_SYSTEM/db/index.db" "SELECT COUNT(*) FROM memory_chunks WHERE path LIKE '%/signals/fallback.md'" \
            | grep -q '^1$'

      - name: Test custom memory system install persists routing
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          export EIDETIC_MEMORY_SYSTEM="$tmp/custom memory-system"
          mkdir -p "$HOME/.claude/hooks" "$HOME/.claude/projects/test-project/memory"
          cat > "$HOME/.claude/settings.json" << 'EOF'
          {
            "hooks": {
              "SessionStart": [
                {"hooks": [{"type": "command", "command": "~/.claude/hooks/smart-memory-inject.sh", "timeout": 5000}]}
              ],
              "Stop": [
                {"hooks": [{"type": "command", "command": "~/.claude/hooks/session-signals.sh", "timeout": 30000, "async": true}]}
              ]
            }
          }
          EOF
          cat > "$HOME/.claude/projects/test-project/memory/test-rule.md" << 'EOF'
          ---
          name: test-rule
          description: Test feedback rule
          type: feedback
          ---
          # Test Rule
          Custom install smoke.
          EOF
          bash install.sh >/dev/null
          python3 - << 'PY'
          import json
          import os
          import shlex
          from pathlib import Path

          home = Path(os.environ["HOME"])
          memory_system = os.environ["EIDETIC_MEMORY_SYSTEM"]
          settings = json.loads((home / ".claude/settings.json").read_text())
          commands = []
          stop_hooks = []
          for entries in settings["hooks"].values():
              for entry in entries:
                  for hook in entry.get("hooks", []):
                      commands.append(hook.get("command", ""))
          for entry in settings["hooks"].get("Stop", []):
              stop_hooks.extend(entry.get("hooks", []))
          assert any(
              cmd.startswith("EIDETIC_MEMORY_SYSTEM=")
              and "smart-memory-inject" in cmd
              and memory_system in cmd
              for cmd in commands
          ), commands
          assert any(
              cmd.startswith("EIDETIC_MEMORY_SYSTEM=")
              and "session-signals" in cmd
              and memory_system in cmd
              for cmd in commands
          ), commands
          signal_hook = next(h for h in stop_hooks if "session-signals" in h.get("command", ""))
          assert signal_hook["timeout"] == 180000, signal_hook
          skill = (home / ".claude/skills/memory-recall/SKILL.md").read_text()
          assert memory_system in skill
          assert "~/.claude/memory-system" not in skill
          expected_search = str(Path(memory_system) / "bin/search.sh")
          search_commands = [
              line.strip()
              for line in skill.splitlines()
              if "bin/search.sh" in line and not line.strip().startswith("#")
          ]
          assert search_commands, skill
          for command in search_commands:
              assert shlex.split(command)[0] == expected_search, command
          assert (Path(memory_system) / ".installed.json").exists()
          PY

      - name: Test custom memory system update persists hook routing
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          export HOME="$tmp/home"
          export EIDETIC_MEMORY_SYSTEM="$tmp/custom memory-system's"
          mkdir -p "$HOME/.claude/hooks" "$HOME/.claude/rules" "$HOME/.claude/projects/test-project/memory" "$EIDETIC_MEMORY_SYSTEM/bin" "$EIDETIC_MEMORY_SYSTEM/db" "$tmp/fakebin"
          cat > "$HOME/.claude/settings.json" << 'EOF'
          {"hooks":{"SessionStart":[{"hooks":[{"type":"command","command":"~/.claude/hooks/smart-memory-inject.sh","timeout":5000}]}],"Stop":[{"hooks":[{"type":"command","command":"~/.claude/hooks/session-signals.sh","timeout":30000,"async":true}]}]}}
          EOF
          cat > "$HOME/.claude/projects/test-project/memory/test-rule.md" << 'EOF'
          ---
          name: test-rule
          description: Test feedback rule
          type: feedback
          ---
          # Test Rule
          Custom update smoke.
          EOF
          printf '{"version":"old","git_sha":"oldsha","installed_at":"2026-01-01T00:00:00Z"}\n' > "$EIDETIC_MEMORY_SYSTEM/.installed.json"
          cat > "$tmp/fakebin/git" << 'EOF'
          #!/bin/bash
          set -euo pipefail
          if [ "${1:-}" = "clone" ]; then
            dest="${@: -1}"
            mkdir -p "$dest"
            (cd "$EIDETIC_FAKE_SOURCE" && tar --exclude .git --exclude output -cf - .) | (cd "$dest" && tar -xf -)
            exit 0
          fi
          if [ "${1:-}" = "-C" ] && [ "${3:-}" = "rev-parse" ]; then
            echo fake-sha-quote
            exit 0
          fi
          exec /usr/bin/git "$@"
          EOF
          chmod +x "$tmp/fakebin/git"
          export EIDETIC_FAKE_SOURCE="$PWD"
          PATH="$tmp/fakebin:$PATH" bash bin/update.sh >/dev/null
          python3 - << 'PY'
          import json
          import os
          import shlex
          from pathlib import Path

          home = Path(os.environ["HOME"])
          memory_system = os.environ["EIDETIC_MEMORY_SYSTEM"]
          settings = json.loads((home / ".claude/settings.json").read_text())
          commands = [
              hook["command"]
              for entries in settings["hooks"].values()
              for entry in entries
              for hook in entry.get("hooks", [])
          ]
          stop_hooks = [
              hook
              for entry in settings["hooks"].get("Stop", [])
              for hook in entry.get("hooks", [])
          ]
          for needle in ["smart-memory-inject", "session-signals"]:
              cmd = next(c for c in commands if needle in c)
              prefix = shlex.split(cmd)[0]
              assert prefix.startswith("EIDETIC_MEMORY_SYSTEM="), cmd
              assert prefix.split("=", 1)[1] == memory_system, cmd
          signal_hook = next(h for h in stop_hooks if "session-signals" in h.get("command", ""))
          assert signal_hook["timeout"] == 180000, signal_hook
          meta = json.loads((Path(memory_system) / ".installed.json").read_text())
          assert meta["git_sha"] == "fake-sha-quote", meta
          skill = (home / ".claude/skills/memory-recall/SKILL.md").read_text()
          expected_search = str(Path(memory_system) / "bin/search.sh")
          search_commands = [
              line.strip()
              for line in skill.splitlines()
              if "bin/search.sh" in line and not line.strip().startswith("#")
          ]
          assert search_commands, skill
