      - name: Test vector fallback validates before dedup
        run: |
          python3 - << 'PY'
          import importlib.machinery
          import sqlite3
          import sys
          sys.path.insert(0, "bin")
          import search_impl

          conn = sqlite3.connect(":memory:")
          conn.execute("""
              CREATE TABLE memory_chunks (
                  id INTEGER PRIMARY KEY,
                  path TEXT,
                  type TEXT,
                  evidence TEXT,
                  source TEXT,
                  last_verified TEXT,
                  content TEXT,
                  section_heading TEXT,
                  description TEXT,
                  project TEXT,
                  card_kind TEXT,
                  status TEXT,
                  area TEXT,
                  supersedes TEXT,
                  superseded_by TEXT
              )
          """)
          conn.execute("INSERT INTO memory_chunks VALUES (1, '/tmp/a.md', 'project', 'observed', 'user-explicit', '', 'stale body', 'Old', 'desc', 'p', 'finding', 'current', '', '', '')")
          conn.execute("INSERT INTO memory_chunks VALUES (2, '/tmp/a.md', 'project', 'observed', 'user-explicit', '', 'valid body', 'New', 'desc', 'p', 'finding', 'current', '', '', '')")

          class Loader:
              def create_module(self, spec):
                  return None

              def exec_module(self, module):
                  module.search = lambda vector_db, query, limit: [
                      (0.99, 1, "/tmp/a.md", "stale", "Old", "wrong-hash"),
                      (0.80, 2, "/tmp/a.md", "valid", "New", "valid-hash"),
                  ]
                  module.content_hash = lambda name, desc, content, heading: "valid-hash" if content == "valid body" else "other-hash"

          class Spec:
              loader = Loader()

          old_spec = search_impl.importlib.util.spec_from_file_location
          try:
              search_impl.importlib.util.spec_from_file_location = lambda *a, **k: importlib.machinery.ModuleSpec("eidetic_embed", Loader())
              results = search_impl._vector_search("vectors.db", conn, "query", 5, None)
          finally:
              search_impl.importlib.util.spec_from_file_location = old_spec
          assert len(results) == 1, results
          assert results[0]["name"] == "valid", results
          PY

