name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create test memory files
        run: |
          mkdir -p ~/.claude/projects/test-project/memory
          cat > ~/.claude/projects/test-project/memory/test-rule.md << 'EOF'
          ---
          name: test-rule
          description: Test feedback rule
          type: feedback
          ---
          # Test Rule
          Never do X because Y.
          EOF

          cat > ~/.claude/projects/test-project/memory/test-project.md << 'EOF'
          ---
          name: test-project-memory
          description: Test project memory
          metadata:
            type: project
            evidence: observed
            card_kind: decision
            status: current
          ---
          # Test Project
          ## Section A
          Content about section A.
          ## Section B
          Content about section B.
          EOF

      - name: Test full index
        run: |
          bash bin/index.sh --full
          CHUNKS=$(sqlite3 ~/.claude/memory-system/db/index.db "SELECT COUNT(*) FROM memory_chunks")
          echo "Indexed $CHUNKS chunks"
          [ "$CHUNKS" -ge 2 ] || exit 1
          sqlite3 ~/.claude/memory-system/db/index.db "SELECT card_kind, status, area, supersedes, superseded_by FROM memory_chunks LIMIT 1" >/dev/null

      - name: Test incremental index
        run: |
          bash bin/index.sh --incremental
          echo "Incremental OK"

      - name: Test search
        run: |
          RESULTS=$(bash bin/search.sh "test rule" --limit 3 2>&1)
          echo "$RESULTS"
          echo "$RESULTS" | grep -q "score=" || exit 1
          echo "$RESULTS" | grep -q "confidence=high" || exit 1

      - name: Test search with type filter
        run: |
          RESULTS=$(bash bin/search.sh "test" --type feedback --limit 3 2>&1)
          echo "$RESULTS" | grep -q "feedback" || exit 1

      - name: Test search JSON output
        run: |
          bash bin/search.sh "test" --json --limit 3 | python3 -c "import json,sys; data=json.load(sys.stdin); assert data; assert all('confidence' in r and 'retrieval_score' in r for r in data)" || exit 1

      - name: Test structured no-confident search output
        run: |
          bash bin/search.sh "zzzznotarealmemoryquery" --json-object --limit 3 | python3 -c "import json,sys; data=json.load(sys.stdin); assert data['no_confident_results'] is True; assert 'results' in data; assert data['best_confidence'] == 'low'" || exit 1

      - name: Test lifecycle inference ignores storage paths
        run: |
          python3 - << 'PY'
          import sys
          sys.path.insert(0, "bin")
          import index_impl

          archive_path = "/tmp/archive/project/finding-active-rule.md"
          assert index_impl.infer_status({"name": "active rule"}, archive_path) == "current"
          assert index_impl.infer_card_kind({"type": "project", "name": "debug tips"}, "/tmp/memory/debug-tips.md") != "bug"
          assert index_impl.infer_status({"name": "old rule", "status": "archived"}, "/tmp/active/old-rule.md") == "archived"
          PY

      - name: Test recall smoke contract assertions
        run: |
          python3 - << 'PY'
          import sys
          sys.path.insert(0, "bin")
          import recall_smoke

          positive = {"expect_any": ["needle"], "min_confidence": "medium"}
          bad_positive = {
              "no_confident_results": True,
              "results": [{"path": "needle.md", "confidence": "high"}],
          }
          ok, detail = recall_smoke.evaluate(positive, bad_positive)
          assert not ok and "no_confident_results=true" in detail

          negative = {"expect_no_confident": True}
          bad_negative = {"no_confident_results": False, "results": []}
          ok, detail = recall_smoke.evaluate(negative, bad_negative)
          assert not ok and "expected no_confident_results=true" in detail
          PY

      - name: Test stable age drift identity migration
        run: |
          python3 - << 'PY'
          import os
          import sqlite3
          import sys
          import tempfile
          sys.path.insert(0, "bin")
          import drift_check

          fd, path = tempfile.mkstemp(suffix=".db")
          os.close(fd)
          try:
              conn = drift_check.init_drift_db(path)
              conn.execute(
                  "INSERT INTO drift_findings (path, drift_type, detail, memory_type, detected_at, first_seen) VALUES (?, 'age_stale', ?, 'project', '2026-05-23T00:00:00Z', 4)",
                  ("/tmp/project.md", "age=88d threshold=30d"),
              )
              conn.commit()
              conn.close()

              conn = drift_check.init_drift_db(path)
              rows = conn.execute("SELECT detail, first_seen FROM drift_findings WHERE drift_type = 'age_stale'").fetchall()
              assert rows == [("threshold=30d", 4)], rows
              conn.close()
          finally:
              os.remove(path)
          PY

      - name: Test feedback rules are never hidden
        run: |
          python3 - << 'PY'
          import sqlite3
          import sys
          sys.path.insert(0, "bin")
          import assemble_context

          conn = sqlite3.connect(":memory:")
          conn.execute("""
              CREATE TABLE memory_chunks (
                  id INTEGER PRIMARY KEY,
                  path TEXT,
                  name TEXT,
                  description TEXT,
                  content TEXT,
                  evidence TEXT,
                  source TEXT,
                  last_verified TEXT,
                  status TEXT,
                  superseded_by TEXT,
                  type TEXT
              )
          """)
          for i in range(20):
              conn.execute(
                  "INSERT INTO memory_chunks (path, name, description, content, evidence, source, status, type) VALUES (?, ?, ?, ?, 'observed', 'user-explicit', 'current', 'feedback')",
                  (f"/tmp/rule-{i}.md", f"feedback-rule-{i}", "Long feedback description " * 5, "body"),
              )
          text, _, total = assemble_context.fetch_feedback(conn, 120)
          assert total == 20
          assert "...and" not in text
          for i in range(20):
              assert f"feedback-rule-{i}" in text
          PY

      - name: Test MCP structured memory_search
        run: |
          mkdir -p db
          python3 bin/index_impl.py --full "$PWD/db/index.db"
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"memory_search","arguments":{"query":"test rule","limit":2}}}' \
            | EIDETIC_MEMORY_SYSTEM="$PWD" python3 mcp_server.py \
            | python3 -c "import json,sys; resp=json.load(sys.stdin); result=resp['result']; assert 'structuredContent' in result; data=result['structuredContent']; assert data['no_confident_results'] is False; assert data['results']; json.loads(result['content'][0]['text'])"

      - name: Test FTS5 special characters
        run: |
          bash bin/search.sh "C++" --limit 1 2>&1 || true
          bash bin/search.sh "key-rotation" --limit 1 2>&1 || true
          echo "Special chars handled OK"

      - name: Test index rebuild idempotency
        run: |
          BEFORE=$(sqlite3 ~/.claude/memory-system/db/index.db "SELECT COUNT(*) FROM memory_chunks")
          bash bin/index.sh --full
          AFTER=$(sqlite3 ~/.claude/memory-system/db/index.db "SELECT COUNT(*) FROM memory_chunks")
          [ "$BEFORE" = "$AFTER" ] || exit 1
          echo "Idempotent: $BEFORE = $AFTER"

      - name: Test lint
        run: bash bin/lint.sh

      - name: Test Obsidian vault export without LLM
        run: |
          VAULT=$(mktemp -d)
          python3 bin/export_vault.py "$VAULT" --no-polish
          test -f "$VAULT/HOME.md"
          test -f "$VAULT/rules/_MOC.md"
          test -f "$VAULT/projects/_MOC.md"
          test ! -d "$VAULT/topics"
          COUNT=$(find "$VAULT" -name '*.md' | wc -l | tr -d ' ')
          echo "Exported markdown files: $COUNT"
          [ "$COUNT" -ge 4 ] || exit 1

      - name: Test cleanup report
        run: python3 bin/cleanup.py --report

      - name: Test session counter
        run: |
          python3 bin/session_counter.py "$(pwd)" record-and-hint
          python3 bin/session_counter.py "$(pwd)" stats

      - name: Test health check
        run: bash bin/health.sh
